<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner Dashboard</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-todo: #e8f4f9;      
            --bg-reminders: #e9f7ef;  
            --bg-meetings: #f2f2f7;   
            --bg-gratitude: #fef9e7;  
            --bg-priorities: #fef1f1; 
            --bg-followup: #fdf2e9;
            --bg-emails: #e8f8f8;
            --bg-calls: #fff9db;
        }
        
        body { font-family: 'SF Pro Display', 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Inline Header & Weather */
        .header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 4px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 25px; }
        .header-left { display: flex; align-items: baseline; gap: 15px; }
        .header h1 { margin: 0; color: var(--stv-blue); font-size: 28px; text-transform: uppercase; }
        .date-display { display: flex; gap: 8px; font-weight: bold; align-items: baseline; }
        
        .weather-selector { font-size: 24px; display: flex; gap: 10px; cursor: pointer; }
        .weather-selector span { opacity: 0.3; transition: 0.2s; }
        .weather-selector span.selected { opacity: 1; transform: scale(1.2); }

        /* Dashboard Grid Structure */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { border-radius: 10px; padding: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .box h3 { margin-top: 0; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; margin-bottom: 12px; }
        
        /* Section Backgrounds */
        #priorities { background: var(--bg-priorities); }
        #todo { background: var(--bg-todo); }
        #reminders { background: var(--bg-reminders); }
        #meetings { background: var(--bg-meetings); }

        textarea, .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; font-size: 14px; 
            background: transparent; resize: none; overflow: hidden; display: block;
        }

        /* Schedule */
        .schedule-box { grid-row: span 2; background: #fff; border: 1px solid #ddd; }
        .schedule-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 6px 0; }
        .time-label { width: 70px; font-weight: bold; font-size: 12px; color: var(--stv-blue); }

        /* Split Section Layouts */
        .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* Bottom Controls */
        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; border-top: 2px solid #eee; padding-top: 20px; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }

        @media print {
            .controls, .weather-selector span:not(.selected) { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            textarea { height: auto !important; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>☀️ Daily Planner</h1>
            <div class="date-display">
                <span id="currentDay" style="font-size: 20px;">Friday</span>
                <span id="currentDate" style="font-size: 16px; color: var(--stv-blue);">March 6, 2026</span>
            </div>
        </div>
        <div class="weather-selector" id="weather">
            <span data-w="☀️">☀️</span><span data-w="🌤️">🌤️</span><span data-w="☁️">☁️</span><span data-w="🌧️">🌧️</span><span data-w="❄️">❄️</span>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Full Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>
        <div>
            <div class="box" id="priorities" style="margin-bottom:20px;">
                <h3>🎯 Top 3 Priorities</h3>
                <textarea id="val-priorities" oninput="autoExpand(this)"></textarea>
            </div>
            <div class="box" id="todo">
                <h3>📝 To Do List</h3>
                <textarea id="val-todo" oninput="autoExpand(this)"></textarea>
            </div>
        </div>
    </div>

    <div class="split-2">
        <div class="box" id="reminders">
            <h3>🛡️ Reminders</h3>
            <textarea id="val-reminders" oninput="autoExpand(this)"></textarea>
        </div>
        <div class="box" id="meetings">
            <h3>🤝 Meetings</h3>
            <textarea id="val-meetings" oninput="autoExpand(this)"></textarea>
        </div>
    </div>

    <div class="split-3">
        <div class="box" style="background: var(--bg-followup);">
            <h3>📞 Follow Up</h3>
            <textarea id="val-followup" oninput="autoExpand(this)"></textarea>
        </div>
        <div class="box" style="background: var(--bg-emails);">
            <h3>📧 Emails</h3>
            <textarea id="val-emails" oninput="autoExpand(this)"></textarea>
        </div>
        <div class="box" style="background: var(--bg-calls);">
            <h3>📱 Calls</h3>
            <textarea id="val-calls" oninput="autoExpand(this)"></textarea>
        </div>
    </div>

    <div class="split-2">
        <div class="box" style="background: var(--bg-gratitude);">
            <h3>🌿 I Am Grateful For</h3>
            <textarea id="val-gratitude" oninput="autoExpand(this)"></textarea>
        </div>
        <div class="box" style="background: #fff9db; border: 1px solid #fab005;">
            <h3>🍲 Nourishment Plan</h3>
            <textarea id="val-meals" oninput="autoExpand(this)" placeholder="B / L / D..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 SAVE PROGRESS</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 EXPORT TO PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "12:00", "13:30", "15:00", "17:00", "18:30", "20:00", "21:30"];
    const scheduleContainer = document.getElementById('scheduleContainer');

    times.forEach(t => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `<div class="time-label">${t}</div><input type="text" id="task-${t}" class="schedule-input" placeholder="...">`;
        scheduleContainer.appendChild(row);
    });

    document.getElementById('weather').addEventListener('click', (e) => {
        if(e.target.dataset.w) {
            document.querySelectorAll('.weather-selector span').forEach(s => s.classList.remove('selected'));
            e.target.classList.add('selected');
            localStorage.setItem('sanaz_weather', e.target.dataset.w);
        }
    });

    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('textarea, .schedule-input').forEach(el => data[el.id] = el.value);
        localStorage.setItem('sanaz_planner_vfinal', JSON.stringify(data));
        alert("Planner Saved Locally!");
    }

    function exportPDF() {
        document.querySelectorAll('textarea').forEach(autoExpand);
        window.print();
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('sanaz_planner_vfinal'));
        if (saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.value = saved[key];
                    if (el.tagName === 'TEXTAREA') autoExpand(el);
                }
            });
        }
        const savedWeather = localStorage.getItem('sanaz_weather');
        if(savedWeather) {
            const span = document.querySelector(`[data-w="${savedWeather}"]`);
            if(span) span.classList.add('selected');
        }
    };
</script>
</body>
</html>
