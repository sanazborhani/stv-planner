<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanaz | STV Technical Dashboard</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-todo: #e8f4f9;      /* Light Blue */
            --bg-reminders: #e9f7ef;  /* Light Green */
            --bg-meetings: #fdf2e9;   /* Light Peach */
            --bg-gratitude: #fef9e7;  /* Light Yellow */
            --bg-priorities: #fef1f1; /* Light Pink/Red */
        }
        
        body { font-family: 'SF Pro Display', 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Header & Date Section */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 4px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; color: var(--stv-blue); font-size: 28px; }
        .date-badge { text-align: right; font-weight: bold; }
        
        /* Buttons */
        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }
        button:hover { transform: translateY(-1px); opacity: 0.9; }

        /* Dashboard Grid Structure */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* Generic Box Styles */
        .box { border-radius: 10px; padding: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .box h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; }
        
        /* Color Mapping (From your Reference) */
        #priorities { background: var(--bg-priorities); }
        #todo { background: var(--bg-todo); }
        #reminders { background: var(--bg-reminders); }
        #meetings { background: var(--bg-meetings); }
        #gratitude { background: var(--bg-gratitude); }

        /* Inputs & Textareas - Dynamic Expansion for PDF */
        textarea, .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; font-size: 15px; 
            background: transparent; resize: none; overflow: hidden; display: block;
        }
        textarea { min-height: 140px; }

        /* Schedule Section (Left Column) */
        .schedule-box { grid-row: span 3; background: #fff; border: 1px solid #ddd; }
        .schedule-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        .time-label { width: 80px; font-weight: bold; font-size: 13px; color: var(--stv-blue); }

        /* Meal Section - Compact and Bottom */
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .meal-box { background: #fff9db; border: 1px solid #fab005; padding: 15px; border-radius: 10px; }
        .meal-item { display: flex; align-items: center; margin-bottom: 5px; font-size: 14px; }
        .meal-item label { font-weight: bold; width: 60px; color: #856404; }

        /* Print Settings (Crucial for PDF) */
        @media print {
            .btn-group { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            textarea { height: auto !important; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🌊 STV Engineering | First Week Roadmap</h1>
            <p style="margin: 5px 0 0 0; color: #555;">PhD, PE | Water Resources Professional</p>
        </div>
        <div class="date-badge">
            <div id="dayName" style="font-size: 22px;">Friday</div>
            <div id="fullDate" style="color: var(--stv-blue);">March 6, 2026</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="save-btn" onclick="saveData()">💾 SAVE DATA</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 EXPORT TO PDF</button>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Full Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities">
            <h3>🎯 Top 3 Strategic Priorities</h3>
            <textarea id="val-priorities" oninput="autoExpand(this)" placeholder="Focus on HEC-RAS 2D environment..."></textarea>
        </div>

        <div class="box" id="todo">
            <h3>📝 To Do List (PHD/PE Focus)</h3>
            <textarea id="val-todo" oninput="autoExpand(this)" placeholder="ArcGIS data prep, culvert analysis..."></textarea>
        </div>

        <div class="box" id="reminders">
            <h3>🛡️ Reminders & Compliance</h3>
            <textarea id="val-reminders" oninput="autoExpand(this)" placeholder="MassDOT Standards, MBTA protocols..."></textarea>
        </div>

        <div class="box" id="meetings">
            <h3>🤝 Technical Syncs & HR Meetings</h3>
            <textarea id="val-meetings" oninput="autoExpand(this)" placeholder="Note technical discussion points..."></textarea>
        </div>
    </div>

    <div class="footer-grid">
        <div class="meal-box">
            <h3 style="margin:0 0 10px 0; font-size: 0.8rem; color: #856404;">🍲 NOURISHMENT PLAN</h3>
            <div class="meal-item"><label>B-FAST:</label><input type="text" id="mealB" class="schedule-input" placeholder="..."></div>
            <div class="meal-item"><label>LUNCH:</label><input type="text" id="mealL" class="schedule-input" placeholder="..."></div>
            <div class="meal-item"><label>DINNER:</label><input type="text" id="mealD" class="schedule-input" placeholder="..."></div>
        </div>
        
        <div class="box" id="gratitude">
            <h3>🌿 I AM GRATEFUL FOR</h3>
            <textarea id="val-gratitude" style="min-height: 80px;" oninput="autoExpand(this)" placeholder="My journey to Boston, finishing the PhD..."></textarea>
        </div>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    const scheduleContainer = document.getElementById('scheduleContainer');

    // Build the Hourly Schedule
    times.forEach(t => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `<div class="time-label">${t}</div><input type="text" id="task-${t}" class="schedule-input" placeholder="...">`;
        scheduleContainer.appendChild(row);
    });

    // Auto-expansion logic to fix the PDF cut-off issue
    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function saveData() {
        const data = {
            priorities: document.getElementById('val-priorities').value,
            todo: document.getElementById('val-todo').value,
            reminders: document.getElementById('val-reminders').value,
            meetings: document.getElementById('val-meetings').value,
            gratitude: document.getElementById('val-gratitude').value,
            mealB: document.getElementById('mealB').value,
            mealL: document.getElementById('mealL').value,
            mealD: document.getElementById('mealD').value
        };
        times.forEach(t => data[`task-${t}`] = document.getElementById(`task-${t}`).value);
        localStorage.setItem('sanaz_final_dashboard', JSON.stringify(data));
        alert("Success! Your Technical Dashboard is Synced Locally.");
    }

    function exportPDF() {
        document.querySelectorAll('textarea').forEach(autoExpand);
        window.print();
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('sanaz_final_dashboard'));
        if (saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key.includes('task-') ? key : 'val-' + key) || document.getElementById(key);
                if (el) {
                    el.value = saved[key];
                    if (el.tagName === 'TEXTAREA') autoExpand(el);
                }
            });
        }
    };
</script>
</body>
</html>
