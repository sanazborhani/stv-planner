<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sanaz | STV Professional & Personal Planner</title>
    <style>
        :root { --stv-blue: #005a8b; --header-bg: #eef2f7; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Header and Buttons */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--stv-blue); letter-spacing: 1px; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }
        button:hover { opacity: 0.8; }

        /* Grid Layout */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .box { border: 1px solid #dee2e6; border-radius: 10px; padding: 18px; background: #fff; display: flex; flex-direction: column; }
        .box h3 { margin-top: 0; color: #495057; font-size: 0.9rem; text-transform: uppercase; border-bottom: 2px solid #f1f3f5; padding-bottom: 8px; margin-bottom: 15px; }
        
        /* Schedule Table */
        .schedule-table { width: 100%; border-collapse: collapse; }
        .schedule-row { border-bottom: 1px solid #f1f3f5; }
        .time-col { width: 80px; font-weight: bold; font-size: 13px; color: var(--stv-blue); padding: 8px 0; }
        .input-cell input { width: 100%; border: none; outline: none; font-size: 14px; padding: 5px; background: transparent; }

        /* Textareas */
        textarea { width: 100%; border: none; font-family: inherit; font-size: 14px; resize: none; min-height: 80px; outline: none; background: #fafafa; border-radius: 5px; padding: 5px; }

        /* Meal Section Specifics */
        .meal-box { background: #fff9db; border-color: #fab005; }
        .meal-item { margin-bottom: 10px; }
        .meal-label { font-weight: bold; font-size: 12px; color: #856404; display: block; }

        /* Print Optimization */
        @media print {
            .btn-group, .instructions { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .box { break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>STV FIRST WEEK | ENGINEER III DASHBOARD</h2>
        <div class="btn-group">
            <button class="save-btn" onclick="saveData()">💾 SAVE DATA</button>
            <button class="pdf-btn" onclick="window.print()">📄 EXPORT TO PDF</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="box" style="grid-row: span 2;">
            <h3>Full Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box">
            <h3>Top 3 Technical Priorities</h3>
            <textarea id="priorities" placeholder="1. Set up HEC-RAS/Python Env&#10;2. ProjectWise access&#10;3. Meet Preethi Sreeraj"></textarea>
        </div>

        <div class="box meal-box">
            <h3>Nourishment & Meal Plan</h3>
            <div class="meal-item">
                <span class="meal-label">Breakfast</span>
                <input type="text" id="breakfast" style="width:100%; border:none; background:transparent;" placeholder="e.g., High protein eggs & toast">
            </div>
            <div class="meal-item">
                <span class="meal-label">Lunch (Networking)</span>
                <input type="text" id="lunch" style="width:100%; border:none; background:transparent;" placeholder="e.g., Salad with team at office">
            </div>
            <div class="meal-item">
                <span class="meal-label">Dinner (Kitchen Therapy)</span>
                <input type="text" id="dinner" style="width:100%; border:none; background:transparent;" placeholder="e.g., Batch cook for Wednesday">
            </div>
        </div>

        <div class="box">
            <h3>Meetings & Technical Syncs</h3>
            <textarea id="meetings" style="min-height: 120px;" placeholder="Newton-Weston Bridge Bundle details..."></textarea>
        </div>

        <div class="box" style="background: #e7f5ff;">
            <h3>I Am Grateful For / Spirit Recharge</h3>
            <textarea id="gratitude" style="background: transparent;" placeholder="Hiking trails, finished PhD, new role at STV..."></textarea>
        </div>
    </div>
</div>

<script>
    // Expanded hours for a full professional and personal day
    const hours = [
        "06:30", "07:00", "07:30", "08:00", "08:30", "09:00", "10:00", 
        "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", 
        "18:00", "19:00", "20:00", "21:30"
    ];
    
    const scheduleContainer = document.getElementById('scheduleContainer');

    // Build the hourly table
    hours.forEach(time => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.style.display = 'flex';
        row.style.alignItems = 'center';
        row.innerHTML = `
            <div class="time-col">${time}</div>
            <div class="input-cell" style="flex-grow:1;">
                <input type="text" id="task-${time}" placeholder="...">
            </div>
        `;
        scheduleContainer.appendChild(row);
    });

    // Save functionality using LocalStorage
    function saveData() {
        const data = {
            priorities: document.getElementById('priorities').value,
            breakfast: document.getElementById('breakfast').value,
            lunch: document.getElementById('lunch').value,
            dinner: document.getElementById('dinner').value,
            meetings: document.getElementById('meetings').value,
            gratitude: document.getElementById('gratitude').value
        };
        hours.forEach(t => data[`task-${t}`] = document.getElementById(`task-${t}`).value);
        
        localStorage.setItem('stv_planner_v2', JSON.stringify(data));
        alert("Planner data saved locally! Click 'Export to PDF' to save your file.");
    }

    // Load data on refresh
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('stv_planner_v2'));
        if (saved) {
            document.getElementById('priorities').value = saved.priorities || "";
            document.getElementById('breakfast').value = saved.breakfast || "";
            document.getElementById('lunch').value = saved.lunch || "";
            document.getElementById('dinner').value = saved.dinner || "";
            document.getElementById('meetings').value = saved.meetings || "";
            document.getElementById('gratitude').value = saved.gratitude || "";
            hours.forEach(t => {
                const input = document.getElementById(`task-${t}`);
                if(input) input.value = saved[`task-${t}`] || "";
            });
        }
    };
</script>
</body>
</html>
