<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sanaz | STV Technical Dashboard</title>
    <style>
        :root { --stv-blue: #005a8b; --accent: #f8f9fa; --border: #d1d5db; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; color: #1f2937; }
        .container { max-width: 1050px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 5px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 26px; color: var(--stv-blue); }
        .date-display { font-weight: bold; color: #4b5563; text-align: right; }

        /* Buttons */
        .btn-group { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #10b981; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { border: 1.5px solid var(--border); border-radius: 12px; padding: 15px; background: white; }
        .box h3 { margin-top: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; border-bottom: 1px solid #edf2f7; padding-bottom: 8px; }

        /* Editable Areas - NO SCROLLING */
        textarea, .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; font-size: 14px; 
            padding: 5px; background: transparent; resize: none; overflow: hidden; 
        }
        textarea { min-height: 120px; display: block; }

        /* Schedule Section */
        .schedule-row { display: flex; align-items: center; border-bottom: 1px solid #f3f4f6; padding: 6px 0; }
        .time-label { width: 70px; font-weight: bold; font-size: 12px; color: var(--stv-blue); }

        /* Bottom Sections (Small & Compact) */
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .small-box { padding: 10px; border: 1px dashed #cbd5e1; border-radius: 8px; font-size: 13px; }
        .meal-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .meal-label { font-weight: bold; width: 50px; color: #856404; }

        /* PDF/Print Optimization */
        @media print {
            .btn-group, .instruction-text { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            textarea { height: auto !important; } /* Forces text to expand in PDF */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>🚀 STV Engineering Launch | Boston Office</h1>
            <p style="margin: 5px 0 0 0; color: #6b7280;">PhD, PE Professional Dashboard</p>
        </div>
        <div class="date-display">
            <div id="currentDay" style="font-size: 20px;">Friday</div>
            <div id="currentDate" style="font-size: 14px; color: var(--stv-blue);">March 6, 2026</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="save-btn" onclick="saveData()">💾 Save My Data</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 Generate PDF Report</button>
    </div>

    <div class="grid">
        <div class="box" style="grid-row: span 2;">
            <h3>📅 Hourly Roadmap</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" style="background: #fffbeb;">
            <h3>🎯 Top 3 Strategic Priorities</h3>
            <textarea id="priorities" oninput="autoExpand(this)" placeholder="1. Technical Onboarding with Preethi&#10;2. HEC-RAS/Python Environment Setup&#10;3. ProjectWise Access & Org"></textarea>
        </div>

        <div class="box">
            <h3>📝 Engineering To-Do List</h3>
            <textarea id="todo" oninput="autoExpand(this)" placeholder="Check culvert ratings...&#10;Update GIS layers...&#10;Review Newton-Weston specs..."></textarea>
        </div>

        <div class="box" style="grid-column: span 1;">
            <h3>🤝 Meeting Notes & Technical Syncs</h3>
            <textarea id="meetings" oninput="autoExpand(this)" placeholder="Discussion points from technical check-ins..."></textarea>
        </div>

        <div class="box">
            <h3>🌊 H&H Modeling & Project Notes</h3>
            <textarea id="projNotes" oninput="autoExpand(this)" placeholder="Mesh refinement notes, Manning's n-value sources..."></textarea>
        </div>
    </div>

    <div class="footer-grid">
        <div class="small-box" style="background: #fefce8;">
            <h4 style="margin: 0 0 8px 0; font-size: 12px; color: #856404;">🍲 MEAL PLAN</h4>
            <div class="meal-row"><span class="meal-label">B:</span><input type="text" id="mealB" class="schedule-input" placeholder="..."></div>
            <div class="meal-row"><span class="meal-label">L:</span><input type="text" id="mealL" class="schedule-input" placeholder="..."></div>
            <div class="meal-row"><span class="meal-label">D:</span><input type="text" id="mealD" class="schedule-input" placeholder="..."></div>
        </div>
        <div class="small-box" style="background: #f0fdf4;">
            <h4 style="margin: 0 0 8px 0; font-size: 12px; color: #166534;">🌿 GRATITUDE & RECHARGE</h4>
            <textarea id="gratitude" style="min-height: 60px; font-size: 12px;" oninput="autoExpand(this)" placeholder="A productive day, a great walk, the move to Boston..."></textarea>
        </div>
    </div>
</div>

<script>
    const hours = ["06:30", "07:30", "08:30", "09:30", "10:30", "12:00", "13:30", "15:00", "17:00", "18:30", "20:00", "21:30"];
    const scheduleContainer = document.getElementById('scheduleContainer');

    // Build Schedule
    hours.forEach(time => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `<div class="time-label">${time}</div><input type="text" id="task-${time}" class="schedule-input" placeholder="...">`;
        scheduleContainer.appendChild(row);
    });

    // Auto-expand textarea to prevent scrollbars in PDF
    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function saveData() {
        const data = {
            priorities: document.getElementById('priorities').value,
            todo: document.getElementById('todo').value,
            meetings: document.getElementById('meetings').value,
            projNotes: document.getElementById('projNotes').value,
            mealB: document.getElementById('mealB').value,
            mealL: document.getElementById('mealL').value,
            mealD: document.getElementById('mealD').value,
            gratitude: document.getElementById('gratitude').value
        };
        hours.forEach(t => data[`task-${t}`] = document.getElementById(`task-${t}`).value);
        localStorage.setItem('sanaz_final_planner', JSON.stringify(data));
        alert("Success! Your technical data is saved locally.");
    }

    function exportPDF() {
        // Force textareas to expand before printing
        document.querySelectorAll('textarea').forEach(autoExpand);
        window.print();
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('sanaz_final_planner'));
        if (saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key);
                if (el) {
                    el.value = saved[key];
                    if (el.tagName === 'TEXTAREA') autoExpand(el);
                }
            });
        }
    };
</script>
</body>
</html>
