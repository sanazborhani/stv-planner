<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner Dashboard</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-todo: #e8f4f9;      /* Light Blue */
            --bg-reminders: #e9f7ef;  /* Light Green */
            --bg-meetings: #fdf2e9;   /* Light Peach */
            --bg-gratitude: #f0fdf4;  /* Light Mint */
            --bg-priorities: #fef1f1; /* Light Pink/Red */
            --bg-nourish: #fff9db;    /* Light Yellow */
        }
        
        body { font-family: 'SF Pro Display', 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Header Section */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 4px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; text-transform: uppercase; letter-spacing: 1px; }
        .date-display { font-weight: bold; color: #4b5563; text-align: right; }
        .weather-selector { font-size: 24px; display: flex; gap: 10px; cursor: pointer; align-items: center; }
        .weather-selector span { opacity: 0.3; transition: 0.2s; }
        .weather-selector span.selected { opacity: 1; transform: scale(1.2); }

        /* Dashboard Grid Structure */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .box { border-radius: 10px; padding: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .box h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        /* Color Mapping */
        #priorities { background: var(--bg-priorities); }
        #todo { background: var(--bg-todo); }
        #reminders { background: var(--bg-reminders); grid-column: 1 / -1; } /* Fixed Empty Space */
        #meetings { background: var(--bg-meetings); grid-column: 1 / -1; } /* Fixed Empty Space */
        #gratitude { background: var(--bg-gratitude); }
        #nourish { background: var(--bg-nourish); border: 1px solid #fab005; }

        /* Inputs & Textareas */
        textarea, .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; font-size: 15px; 
            background: transparent; resize: none; overflow: hidden; display: block;
        }
        textarea { min-height: 100px; }

        /* Schedule Section */
        .schedule-box { grid-row: span 2; background: #fff; border: 1px solid #ddd; }
        .schedule-row { display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        .time-label { width: 80px; font-weight: bold; font-size: 13px; color: var(--stv-blue); }

        /* Bottom Controls */
        .controls { margin-top: 30px; display: flex; gap: 15px; justify-content: center; border-top: 2px solid #eee; padding-top: 20px; }
        button { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        @media print {
            .controls, .weather-selector span:not(.selected) { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            textarea { height: auto !important; } 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>☀️ Daily Planner</h1>
        <div class="date-display">
            <div id="currentDay" style="font-size: 20px;">Friday</div>
            <div id="currentDate" style="font-size: 14px; color: var(--stv-blue);">March 6, 2026</div>
        </div>
        <div class="weather-selector" id="weather">
            <span data-w="☀️">☀️</span>
            <span data-w="🌤️">🌤️</span>
            <span data-w="☁️">☁️</span>
            <span data-w="🌧️">🌧️</span>
            <span data-w="❄️">❄️</span>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Full Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities">
            <h3>🎯 Top 3 Priorities</h3>
            <textarea id="val-priorities" oninput="autoExpand(this)" placeholder="Focus on..."></textarea>
        </div>

        <div class="box" id="todo">
            <h3>📝 To Do List</h3>
            <textarea id="val-todo" oninput="autoExpand(this)" placeholder="Specific tasks..."></textarea>
        </div>

        <div class="box" id="reminders">
            <h3>🛡️ Reminders </h3>
            <textarea id="val-reminders" oninput="autoExpand(this)" placeholder="Standards and protocols..."></textarea>
        </div>

        <div class="box" id="meetings">
            <h3>🤝 Meetings & Notes </h3>
            <textarea id="val-meetings" oninput="autoExpand(this)" placeholder="Meeting notes and discussion points..."></textarea>
        </div>

        <div class="box" id="nourish">
            <h3>🍲 Nourishment Plan</h3>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div style="display:flex; align-items:center;"><label style="width:70px; font-weight:bold; color:#856404;">B-FAST:</label><input type="text" id="mealB" class="schedule-input" placeholder="..."></div>
                <div style="display:flex; align-items:center;"><label style="width:70px; font-weight:bold; color:#856404;">LUNCH:</label><input type="text" id="mealL" class="schedule-input" placeholder="..."></div>
                <div style="display:flex; align-items:center;"><label style="width:70px; font-weight:bold; color:#856404;">DINNER:</label><input type="text" id="mealD" class="schedule-input" placeholder="..."></div>
            </div>
        </div>

        <div class="box" id="gratitude">
            <h3>🌿 I Am Grateful For</h3>
            <textarea id="val-gratitude" oninput="autoExpand(this)" placeholder="Today I am thankful for..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 SAVE PROGRESS</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 EXPORT TO PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    const scheduleContainer = document.getElementById('scheduleContainer');

    times.forEach(t => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `<div class="time-label">${t}</div><input type="text" id="task-${t}" class="schedule-input" placeholder="...">`;
        scheduleContainer.appendChild(row);
    });

    // Weather Selection
    document.getElementById('weather').addEventListener('click', (e) => {
        if(e.target.dataset.w) {
            document.querySelectorAll('.weather-selector span').forEach(s => s.classList.remove('selected'));
            e.target.classList.add('selected');
            localStorage.setItem('sanaz_weather', e.target.dataset.w);
        }
    });

    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function saveData() {
        const data = {
            priorities: document.getElementById('val-priorities').value,
            todo: document.getElementById('val-todo').value,
            reminders: document.getElementById('val-reminders').value,
            meetings: document.getElementById('val-meetings').value,
            gratitude: document.getElementById('val-gratitude').value,
            mealB: document.getElementById('mealB').value,
            mealL: document.getElementById('mealL').value,
            mealD: document.getElementById('mealD').value
        };
        times.forEach(t => data[`task-${t}`] = document.getElementById(`task-${t}`).value);
        localStorage.setItem('sanaz_daily_planner_vfinal', JSON.stringify(data));
        alert("Planner Saved Successfully!");
    }

    function exportPDF() {
        document.querySelectorAll('textarea').forEach(autoExpand);
        window.print();
    }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('sanaz_daily_planner_vfinal'));
        if (saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key.includes('task-') ? key : 'val-' + key) || document.getElementById(key);
                if (el) {
                    el.value = saved[key];
                    if (el.tagName === 'TEXTAREA') autoExpand(el);
                }
            });
        }
        const savedWeather = localStorage.getItem('sanaz_weather');
        if(savedWeather) {
            const span = document.querySelector(`[data-w="${savedWeather}"]`);
            if(span) span.classList.add('selected');
        }
    };
</script>
</body>
</html>
